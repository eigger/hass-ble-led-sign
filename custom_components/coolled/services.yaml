write:
  target:
    device:
      integration: coolled
  fields:
    payload:
      required: true
      example: |
        - type: text
          value: Hello HA
          x: 2
          y: 1
          size: 10
          color: white
      default:
        - type: text
          value: Hello HA
          x: 2
          y: 1
          size: 10
          color: white
      selector:
        object:
    rotate:
      required: false
      example: 0
      selector:
        number:
          min: 0
          max: 270
          step: 90
    background:
      required: false
      example: black
      selector:
        select:
          options:
            - "black"
            - "off"
            - "white"
            - "on"
            - "red"
            - "yellow"
            - "green"
            - "cyan"
            - "blue"
            - "purple"
            - "orange"
            - "pink"
    threshold:
      required: false
      example: 128
      selector:
        number:
          min: 0
          max: 255
          step: 1
    invert:
      required: false
      example: false
      selector:
        boolean:
    dry_run:
      required: false
      example: false
      selector:
        boolean:

send_text:
  target:
    device:
      integration: coolled
  fields:
    text:
      required: true
      example: Hello Home Assistant
      selector:
        text:
    color:
      required: false
      example: white
      selector:
        select:
          options:
            - "white"
            - "red"
            - "yellow"
            - "green"
            - "cyan"
            - "blue"
            - "purple"
            - "orange"
            - "pink"

send_image:
  target:
    device:
      integration: coolled
  fields:
    image_path:
      required: true
      example: /config/www/coolled.png
      selector:
        text:
    threshold:
      required: false
      example: 128
      selector:
        number:
          min: 0
          max: 255
          step: 1
    invert:
      required: false
      example: false
      selector:
        boolean:

send_animation:
  target:
    device:
      integration: coolled
  fields:
    image_path:
      required: true
      example: /config/www/coolled.gif
      selector:
        text:
    speed_ms:
      required: false
      example: 500
      selector:
        number:
          min: 50
          max: 5000
          step: 10
          unit_of_measurement: ms
    threshold:
      required: false
      example: 128
      selector:
        number:
          min: 0
          max: 255
          step: 1
    invert:
      required: false
      example: false
      selector:
        boolean:

send_jt:
  target:
    device:
      integration: coolled
  fields:
    jt_path:
      required: true
      example: /config/www/sign.jt
      selector:
        text:

set_icon:
  target:
    device:
      integration: coolled
  fields:
    icon_id:
      required: true
      example: 1
      selector:
        number:
          min: 0
          max: 255
          step: 1

set_music:
  target:
    device:
      integration: coolled
  fields:
    heights:
      required: true
      example: [4, 8, 12, 16, 12, 8, 4, 2]
      selector:
        object:
    colors:
      required: true
      example: [1, 2, 3, 4, 3, 2, 1, 1]
      selector:
        object:
